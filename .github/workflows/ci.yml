name: CI

on:
  push:
    branches:
      - main 
  workflow_dispatch: 

jobs:
  sync-to-fork:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Main Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          persist-credentials: false 

      - name: Push - PR - Merge
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
          FORK_REPO: "nilxnjxn/nilxnjxn"
          TARGET_BRANCH: "main" 
        run: |
          echo "Starting secure sync process to $FORK_REPO..."
          
          # 1. Configure Git as a bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 2. Check out a fresh sync branch from our current local state (the main repo)
          SYNC_BRANCH="auto-sync-$(date +%s)"
          git checkout -b $SYNC_BRANCH

          # 3. Add the remote target fork repository using OAuth2 token format (Highly Reliable)
          git remote add target-fork https://oauth2:${GH_TOKEN}@github.com/${FORK_REPO}.git

          # 4. Push our brand new branch straight to the fork repository
          echo "Pushing branch $SYNC_BRANCH to $FORK_REPO..."
          git push target-fork $SYNC_BRANCH

          # 5. Create a Pull Request in the fork repository using the GitHub CLI
          echo "Creating Pull Request on $FORK_REPO from $SYNC_BRANCH to $TARGET_BRANCH..."
          PR_URL=$(gh pr create \
            --repo $FORK_REPO \
            --base $TARGET_BRANCH \
            --head $SYNC_BRANCH \
            --title "Sync: Updates from Upstream Main" \
            --body "This PR was automatically generated by GitHub Actions to sync the latest changes from the main repository (${{ github.repository }})." \
            --fill)
            
          echo "Pull request created: $PR_URL"

          # 6. Automatically merge the Pull Request using the GitHub CLI
          echo "Auto-merging the Pull Request..."
          gh pr merge $PR_URL --merge --auto --repo $FORK_REPO --delete-branch
          
          # 7. Trigger Vercel Deployment Hook
          echo "Triggering Vercel Deployment Hook..."
          curl -X POST https://api.vercel.com/v1/integrations/deploy/prj_ygjbV5TRx4H6aTluose7utZSHvdO/0vqC4qlSQD
          
          echo "Sync and deploy trigger complete!"
